<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
        }

        .report-info {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background-color: #6366f1;
            color: white;
            padding: 8px;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background-color: #f5f5f5;
        }

        footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #777;
        }

        @page {
            margin: 50px;
        }

        .page-number:after {
            content: counter(page);
        }

    </style>
</head>
<body>

<div class="header">
    <h1>Your Company Name</h1>
    <p>{{ report_title }}</p>
</div>

<div class="report-info">
    <strong>Generated On:</strong> {{ generated_on }}
</div>

<table>
    <thead>
        <tr>
            {% for head in headers %}
                <th>{{ head }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for row in rows %}
        <tr>
            {% for col in row %}
                <td>{{ col }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>

<footer>
    This is a system generated report.
    | Page <span class="page-number"></span>
</footer>

</body>
</html>
