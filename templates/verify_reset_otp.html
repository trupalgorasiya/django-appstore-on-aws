{% extends "base.html" %}
{% block content %}

<div class="auth-container">
    <div class="auth-box">
        <h2>Verify OTP</h2>

        <!-- {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %} -->

        </form>
    </div>
</div>

{% endblock %}
